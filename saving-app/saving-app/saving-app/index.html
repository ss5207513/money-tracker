<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>智慧存錢記帳系統</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <p class="tag">Smart Saving App</p>
        <h1>智慧存錢記帳系統</h1>
        <p class="subtitle">記錄收入與支出，自動計算目前存款與存錢進度</p>
      </div>
    </header>

    <section class="summary">
      <div class="summary-card income">
        <p>總收入</p>
        <h2 id="totalIncome">$0</h2>
      </div>

      <div class="summary-card expense">
        <p>總支出</p>
        <h2 id="totalExpense">$0</h2>
      </div>

      <div class="summary-card balance">
        <p>目前存款</p>
        <h2 id="balance">$0</h2>
      </div>
    </section>

    <section class="goal-box">
      <div class="goal-title">
        <div>
          <h2>存錢目標</h2>
          <p>設定你想存到的金額</p>
        </div>
      </div>

      <div class="goal-inputs">
        <input type="text" id="goalName" placeholder="目標名稱，例如：買手機、旅行基金" />
        <input type="number" id="goalAmount" placeholder="目標金額，例如：30000" />
        <button onclick="saveGoal()">儲存目標</button>
      </div>

      <div class="progress-area">
        <div class="progress-text">
          <span id="goalText">尚未設定目標</span>
          <span id="progressPercent">0%</span>
        </div>

        <div class="progress-bar">
          <div id="progressFill"></div>
        </div>
      </div>
    </section>

    <section class="main-grid">
      <div class="form-box">
        <h2>新增紀錄</h2>

        <label>類型</label>
        <select id="type">
          <option value="income">收入</option>
          <option value="expense">支出</option>
        </select>

        <label>分類</label>
        <select id="category">
          <option value="薪水">薪水</option>
          <option value="零用錢">零用錢</option>
          <option value="獎金">獎金</option>
          <option value="餐飲">餐飲</option>
          <option value="交通">交通</option>
          <option value="購物">購物</option>
          <option value="娛樂">娛樂</option>
          <option value="學習">學習</option>
          <option value="生活">生活</option>
          <option value="其他">其他</option>
        </select>

        <label>金額</label>
        <input type="number" id="amount" placeholder="例如：120" />

        <label>日期</label>
        <input type="date" id="date" />

        <label>備註</label>
        <input type="text" id="note" placeholder="例如：午餐、打工收入、飲料" />

        <button class="add-btn" onclick="addRecord()">新增這一筆</button>
      </div>

      <div class="record-box">
        <div class="record-header">
          <div>
            <h2>交易紀錄</h2>
            <p>最近新增的紀錄會顯示在上方</p>
          </div>

          <button class="clear-btn" onclick="clearAllRecords()">清空</button>
        </div>

        <ul id="recordList"></ul>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
