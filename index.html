<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>簡單記帳 Cute Money Book</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- 頂部 -->
    <header class="hero">
      <div class="hero-left">
        <p class="mini-title">My Cute Money Book</p>
        <h1>簡單記帳</h1>
        <p class="hero-subtitle">輕鬆記錄收入與支出，讓存錢變得更可愛 ♡</p>
      </div>

      <div class="hero-right">
        <div class="avatar-upload">
          <input type="file" id="avatarInput" accept="image/*" hidden />
          <label for="avatarInput" class="avatar-box" title="點我上傳大頭貼">
            <img id="avatarPreview" src="" alt="大頭貼" />
            <span id="avatarPlaceholder">🐷</span>
          </label>
        </div>
      </div>
    </header>

    <!-- 總覽 -->
    <section class="cards">
      <div class="card income-card">
        <p>總收入</p>
        <h2 id="totalIncome">$0</h2>
      </div>

      <div class="card expense-card">
        <p>總支出</p>
        <h2 id="totalExpense">$0</h2>
      </div>

      <div class="card balance-card">
        <p>目前存款</p>
        <h2 id="balance">$0</h2>
      </div>
    </section>

    <!-- 存錢目標 -->
    <section class="goal-box">
      <div class="section-title">
        <h2>存錢目標</h2>
        <p>設定你想存到的金額</p>
      </div>

      <div class="goal-form">
        <input type="text" id="goalName" placeholder="目標名稱，例如：買手機、旅行基金" />
        <input type="number" id="goalAmount" placeholder="目標金額，例如：30000" />
        <button id="saveGoalBtn">儲存目標</button>
      </div>

      <div class="goal-status">
        <div class="goal-text-row">
          <span id="goalLabel">尚未設定目標</span>
          <span id="goalPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div id="goalProgressBar" class="progress-fill"></div>
        </div>
      </div>
    </section>

    <!-- 主要內容 -->
    <section class="main-grid">
      <!-- 左側：新增紀錄 -->
      <div class="form-box">
        <h2>新增紀錄</h2>

        <label for="type">類型</label>
        <select id="type">
          <option value="income">收入</option>
          <option value="expense">支出</option>
        </select>

        <label for="category">分類</label>
        <select id="category"></select>

        <label for="amount">金額</label>
        <input type="number" id="amount" placeholder="例如：1200" />

        <label for="date">日期</label>
        <input type="date" id="date" />

        <label for="note">備註</label>
        <input type="text" id="note" placeholder="例如：午餐、打工收入、飲料" />

        <button id="addRecordBtn" class="main-btn">新增這一筆</button>
      </div>

      <!-- 右側：交易紀錄 -->
      <div class="record-box">
        <div class="record-header">
          <div>
            <h2>📒 交易紀錄</h2>
            <p>最近新增的紀錄會顯示在最上方</p>
          </div>
          <button id="clearBtn" class="clear-btn">清空</button>
        </div>

        <div class="filter-box">
          <label for="monthFilter">選擇月份</label>
          <input type="month" id="monthFilter" />
        </div>

        <div class="month-summary">
          <div class="summary-row income-row">
            <span>當月總收入</span>
            <strong id="monthIncome">$0</strong>
          </div>
          <div class="summary-row expense-row">
            <span>當月總支出</span>
            <strong id="monthExpense">$0</strong>
          </div>
        </div>

        <ul id="recordList" class="record-list"></ul>

        <div class="pagination" id="paginationBox">
          <button id="prevPageBtn" class="page-btn">上一頁</button>
          <span id="pageInfo">第 1 / 1 頁</span>
          <button id="nextPageBtn" class="page-btn">下一頁</button>
        </div>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
