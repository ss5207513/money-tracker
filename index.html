<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>簡單記帳 Cute Money Book</title>

  <link rel="stylesheet" href="style.css" />

  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <script src="script.js" defer></script>
</head>

<body>
  <div class="container">

    <!-- 頂部 -->
    <header class="hero">
      <div class="hero-left">
        <p class="mini-title">My Cute Money Book</p>
        <h1>簡單記帳</h1>
        <p class="hero-subtitle">收入、支出、發票載具，一起整理好 ♡</p>
      </div>

      <div class="hero-right">
        <div class="avatar-upload">
          <input type="file" id="avatarInput" accept="image/*" />
          <button type="button" id="avatarBtn" class="avatar-box">
            <img id="avatarPreview" src="" alt="大頭貼" />
            <span id="avatarPlaceholder">🐷</span>
          </button>
          <p class="avatar-tip">點擊更換</p>
        </div>
      </div>
    </header>

    <!-- 總覽 -->
    <section class="cards">
      <div class="card income-card">
        <p>總收入</p>
        <h2 id="totalIncome">$0</h2>
      </div>

      <div class="card expense-card">
        <p>總支出</p>
        <h2 id="totalExpense">$0</h2>
      </div>

      <div class="card balance-card">
        <p>目前存款</p>
        <h2 id="balance">$0</h2>
      </div>
    </section>

    <!-- 分類切換 -->
    <nav class="category-tabs">
      <button type="button" class="tab-btn active" data-tab="moneySection">
        💰 記帳
      </button>

      <button type="button" class="tab-btn" data-tab="invoiceSection">
        🧾 發票載具
      </button>
    </nav>

    <!-- 記帳分類 -->
    <section id="moneySection" class="tab-section active">

      <!-- 存錢目標 -->
      <section class="goal-box">
        <div class="section-title">
          <h2>🎯 存錢目標</h2>
          <p>設定你想存到的金額</p>
        </div>

        <div class="goal-form">
          <input type="text" id="goalName" placeholder="目標名稱，例如：買手機、旅行基金" />
          <input type="number" id="goalAmount" placeholder="目標金額，例如：30000" />
          <button type="button" id="saveGoalBtn">儲存目標</button>
        </div>

        <div class="goal-status">
          <div class="goal-text-row">
            <span id="goalLabel">尚未設定目標</span>
            <span id="goalPercent">0%</span>
          </div>

          <div class="progress-bar">
            <div id="goalProgressBar" class="progress-fill"></div>
          </div>
        </div>
      </section>

      <!-- 新增紀錄 -->
      <section class="form-box">
        <h2>📝 新增紀錄</h2>

        <label for="type">類型</label>
        <select id="type">
          <option value="income">收入</option>
          <option value="expense">支出</option>
        </select>

        <label for="category">分類</label>
        <select id="category"></select>

        <label for="amount">金額</label>

        <div class="amount-row">
          <input type="number" id="amount" placeholder="例如：1200" />

          <button type="button" id="openCalculatorBtn" class="calc-open-btn">
            <span class="calc-face">ฅ</span>
            <span class="calc-icon">🧮</span>
          </button>
        </div>

        <div id="calculatorBox" class="calculator-box">
          <div class="calculator-header">
            <strong>計算機</strong>
            <button type="button" id="closeCalculatorBtn">×</button>
          </div>

          <input type="text" id="calcDisplay" readonly placeholder="0" />

          <div class="calc-grid">
            <button type="button" data-calc="7">7</button>
            <button type="button" data-calc="8">8</button>
            <button type="button" data-calc="9">9</button>
            <button type="button" data-calc="/">÷</button>

            <button type="button" data-calc="4">4</button>
            <button type="button" data-calc="5">5</button>
            <button type="button" data-calc="6">6</button>
            <button type="button" data-calc="*">×</button>

            <button type="button" data-calc="1">1</button>
            <button type="button" data-calc="2">2</button>
            <button type="button" data-calc="3">3</button>
            <button type="button" data-calc="-">−</button>

            <button type="button" data-calc="0">0</button>
            <button type="button" data-calc=".">.</button>
            <button type="button" id="calcEqualBtn">=</button>
            <button type="button" data-calc="+">+</button>
          </div>

          <div class="calc-actions">
            <button type="button" id="calcClearBtn" class="soft-btn">清除</button>
            <button type="button" id="calcBackBtn" class="soft-btn">倒退</button>
            <button type="button" id="useCalcAmountBtn" class="main-btn">帶入金額</button>
          </div>
        </div>

        <label for="date">日期</label>
        <input type="date" id="date" />

        <label for="note">備註</label>
        <input type="text" id="note" placeholder="例如：午餐、打工收入、飲料" />

        <button type="button" id="addRecordBtn" class="main-btn">
          新增這一筆
        </button>
      </section>

      <!-- 交易紀錄 -->
      <section class="record-box">
        <div class="record-header">
          <div>
            <h2>📒 交易紀錄</h2>
            <p>最近新增的紀錄會顯示在最上方</p>
          </div>

          <button type="button" id="clearBtn" class="clear-btn">清空</button>
        </div>

        <div class="filter-box">
          <label for="monthFilter">選擇月份</label>
          <input type="month" id="monthFilter" />
        </div>

        <div class="month-summary">
          <div class="summary-row income-row">
            <span>當月總收入</span>
            <strong id="monthIncome">$0</strong>
          </div>

          <div class="summary-row expense-row">
            <span>當月總支出</span>
            <strong id="monthExpense">$0</strong>
          </div>
        </div>

        <ul id="recordList" class="record-list"></ul>

        <div class="pagination" id="paginationBox">
          <button type="button" id="prevPageBtn" class="page-btn">上一頁</button>
          <span id="pageInfo">第 1 / 1 頁</span>
          <button type="button" id="nextPageBtn" class="page-btn">下一頁</button>
        </div>
      </section>
    </section>

    <!-- 發票載具分類 -->
    <section id="invoiceSection" class="tab-section">
      <section class="invoice-box">
        <div class="record-header">
          <div>
            <h2>🧾 發票載具</h2>
            <p>儲存載具號碼，並掃描或上傳發票 QR Code</p>
          </div>
        </div>

        <div class="carrier-area">
          <label for="carrierNumber">載具號碼</label>
          <input type="text" id="carrierNumber" placeholder="例如：/CL76CK" />

          <button type="button" id="saveCarrierBtn" class="main-btn">
            儲存載具
          </button>

          <p class="carrier-now">
            目前載具：<span id="currentCarrier">尚未設定</span>
          </p>
        </div>

        <div class="scan-area">
          <button type="button" id="startScanBtn" class="main-btn">
            開啟相機掃描 QR Code
          </button>

          <button type="button" id="stopScanBtn" class="soft-btn">
            停止掃描
          </button>

          <div id="scannerArea"></div>

          <label class="upload-label">
            上傳發票圖片掃描
            <input type="file" id="invoiceImage" accept="image/*" />
          </label>
        </div>

        <div class="invoice-list-box">
          <h3>已掃描發票</h3>
          <ul id="invoiceList" class="invoice-list"></ul>
        </div>
      </section>
    </section>

  </div>
</body>
</html>
