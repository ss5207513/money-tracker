<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>簡單記帳 Cute 版</title>

  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>

<body>
  <div class="app">

    <header class="top-bar">
      <div>
        <p class="small-title">My Cute Money Book</p>
        <h1>簡單記帳</h1>
        <p class="top-desc">輕鬆記錄收入與支出，讓存錢變得更可愛 ♡</p>
      </div>

      <div class="top-icon">🐷</div>
    </header>

    <section class="balance-card">
      <p class="balance-label">目前存款</p>
      <h2 id="balance">$0</h2>

      <div class="balance-row">
        <div class="mini-card income-card">
          <span>總收入</span>
          <strong id="totalIncome">$0</strong>
        </div>

        <div class="mini-card expense-card">
          <span>總支出</span>
          <strong id="totalExpense">$0</strong>
        </div>
      </div>
    </section>

    <section class="goal-card">
      <div class="card-head">
        <h2>🎯 存錢目標</h2>
        <span id="progressPercent">0%</span>
      </div>

      <div class="goal-inputs">
        <input type="text" id="goalName" placeholder="目標名稱，例如：買手機、旅行基金" />
        <input type="number" id="goalAmount" placeholder="目標金額，例如：30000" />
        <button type="button" id="saveGoalBtn">儲存目標</button>
      </div>

      <p id="goalText" class="goal-text">尚未設定目標</p>

      <div class="progress-bar">
        <div id="progressFill"></div>
      </div>
    </section>

    <section class="add-card">
      <div class="card-head">
        <h2>📝 新增紀錄</h2>
      </div>

      <div class="type-row">
        <select id="type">
          <option value="income">收入</option>
          <option value="expense">支出</option>
        </select>

        <select id="category">
          <option value="薪水">薪水</option>
          <option value="零用錢">零用錢</option>
          <option value="獎金">獎金</option>
          <option value="餐飲">餐飲</option>
          <option value="交通">交通</option>
          <option value="購物">購物</option>
          <option value="娛樂">娛樂</option>
          <option value="學習">學習</option>
          <option value="生活">生活</option>
          <option value="其他">其他</option>
        </select>
      </div>

      <input type="number" id="amount" placeholder="輸入金額，例如：120" />
      <input type="date" id="date" />
      <input type="text" id="note" placeholder="備註，例如：午餐、打工收入、飲料" />

      <button type="button" class="add-btn" id="addRecordBtn">新增這一筆</button>
    </section>

    <section class="record-card">
      <div class="record-header">
        <div>
          <h2>📒 交易紀錄</h2>
          <p>最近新增的紀錄會顯示在最上方</p>
        </div>

        <button type="button" class="clear-btn" id="clearRecordsBtn">清空</button>
      </div>

      <ul id="recordList"></ul>
    </section>

    <section class="invoice-card">
      <div class="record-header">
        <div>
          <h2>🧾 發票載具</h2>
          <p>儲存載具號碼，並掃描或上傳發票 QR Code</p>
        </div>
      </div>

      <div class="carrier-box">
        <label for="carrierNumber">載具號碼</label>

        <input type="text" id="carrierNumber" placeholder="例如：/CL76CK" />

        <button type="button" class="carrier-btn" id="saveCarrierBtn">儲存載具</button>

        <p class="carrier-now">
          目前載具：<span id="currentCarrier">尚未設定</span>
        </p>
      </div>

      <div class="scan-box">
        <button type="button" class="scan-btn" id="startScanBtn">開啟相機掃描</button>
        <button type="button" class="stop-btn" id="stopScanBtn">停止掃描</button>

        <video id="scannerVideo" autoplay playsinline></video>

        <label class="upload-label">
          上傳發票圖片掃描
          <input type="file" id="invoiceImage" accept="image/*" />
        </label>
      </div>

      <div class="invoice-list-box">
        <h3>已掃描發票</h3>
        <ul id="invoiceList"></ul>
      </div>
    </section>

    <nav class="bottom-nav">
      <div class="nav-item active">首頁</div>
      <div class="nav-item">記帳</div>
      <div class="nav-item">發票</div>
      <div class="nav-item">設定</div>
    </nav>

  </div>
</body>
</html>
